layout: {qmk_keyboard: splitkb/aurora/sweep/rev1, layout_name: LAYOUT_split_3x5_2}
layers:
  COLEMAK:
  - - Q
    - W
    - F
    - P
    - B
    - J
    - L
    - U
    - Y
    - ;
    - {t: A, h: LCTL}
    - {t: R, h: LALT}
  - - {t: S, h: LSFT}
    - {t: T, h: LGUI}
    - G
    - M
    - {t: N, h: RGUI}
    - {t: E, h: RSFT}
    - {t: I, h: RALT}
    - {t: O, h: RCTL}
    - Z
    - X
    - C
    - D
  - - V
    - K
    - H
    - ','
    - .
    - /
    - {t: TAB, h: NUM}
    - {t: SPC, h: NAV}
    - {t: BSPC, h: SYM}
    - {t: ESC, h: FUN}
  QWERTY:
  - [Q, W, E, R, T, Y, U, I, O, P, Ctl+A, Alt+S]
  - [Sft+D, Gui+F, G, H, Gui+J, Sft+K, AltGr+L, Ctl+;, Z, X, C, V]
  - - B
    - N
    - M
    - ','
    - .
    - /
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  NAV:
  - [TAB, ANY(DM REC1), ANY(DM PLY1), CW TOGG, ANY(SRCHSEL), ANY(CPY URL), HOME, UP, END, BSPC, LCTL, LALT]
  - [LSFT, LGUI, QK REP, QK AREP, LEFT, DOWN, RGHT, ENT, ANY(SW CTAB), ANY(SW BTICK), ANY(SW TAB), ANY(SELWORD)]
  - - ANY(QK LLCK)
    - ''
    - PGDN
    - PGUP
    - ANY(S END)
    - DEL
    - {t: ▽, type: trans}
    - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  SYM:
  - ['~', <, '>', '#', '@', '&', '`', '[', ']', \, '!', '-']
  - [':', '=', '0', '1', _, (, ), $, ^, +, '*', '''']
  - - ANY(UPDIR)
    - '|'
    - '"'
    - '{'
    - '}'
    - '%'
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
    - {t: ▽, type: trans}
  NUM:
  - [TAB, HOME, UP, END, DEL, '*', '7', '8', '9', +, ENT, LEFT]
  - [DOWN, RGHT, BSPC, '-', '4', '5', '6', '0', LCTL, LALT, LSFT, LGUI]
  - - ANY(QK LLCK)
    - /
    - '1'
    - '2'
    - '3'
    - .
    - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  FUN:
  - [BRIU, MUTE, VOLD, VOLU, '', '', F7, F8, F9, F12, BRID, MPRV]
  - [MPLY, MNXT, '', '', F4, F5, F6, F11, '', ANY(RGB IB NE), ANY(RGBT NE), ANY(RGB DB NE)]
  - - ''
    - ''
    - F1
    - F2
    - F3
    - F10
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
  GAME:
  - ['1', '2', '3', '4', '5', '', '', '', '', BSPC, Q, W]
  - - E
    - R
    - T
    - ''
    - {t: COLEMAK, h: toggle}
    - ESC
    - ''
    - ENT
    - A
    - S
    - D
    - F
  - [G, '', '', '', '', RSFT, SPC, LALT, ANY(TL UPPR), ANY(TL LOWR)]
